<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Top bar ─────────────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-left">
      <button class="icon-btn" id="btn-menu" aria-label="Main menu" aria-expanded="false" aria-controls="sidebar">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
      </button>
      <div class="brand">
        <svg class="brand-logo" viewBox="0 0 24 24" width="32" height="32" aria-hidden="true">
          <rect x="2" y="3" width="20" height="19" rx="3" fill="#fff" stroke="#dadce0"/>
          <rect x="2" y="3" width="20" height="5" rx="3" fill="#1a73e8"/>
          <text x="12" y="19" text-anchor="middle" font-size="9" font-weight="600" fill="#5f6368" font-family="Arial, sans-serif">31</text>
        </svg>
        <span class="brand-name">Calendar</span>
      </div>
    </div>

    <div class="header-center">
      <button class="btn-today" id="btn-today">Today</button>
      <div class="nav-arrows">
        <button class="icon-btn icon-btn--sm" id="btn-prev" aria-label="Previous month">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        </button>
        <button class="icon-btn icon-btn--sm" id="btn-next" aria-label="Next month">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </button>
      </div>
      <h1 class="month-label" id="month-label">Month Year</h1>
    </div>

    <div class="header-right">
      <button class="icon-btn" aria-label="Search">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 10-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1114 9.5 4.5 4.5 0 019.5 14z"/></svg>
      </button>
      <button class="icon-btn" aria-label="Settings">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.48.48 0 00-.48-.41h-3.84a.48.48 0 00-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.48.48 0 00-.59.22L2.74 8.87a.48.48 0 00.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.13.22.39.3.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 00-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1112 8.4a3.6 3.6 0 010 7.2z"/></svg>
      </button>
      <span class="view-pill">Month</span>
    </div>
  </header>

  <!-- ── Body: sidebar + calendar ────────────────────────────── -->
  <div class="app-body">

    <aside class="sidebar" id="sidebar" aria-label="Sidebar">
      <button class="create-btn" id="btn-create">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        <span>Create</span>
      </button>

      <!-- Mini calendar -->
      <div class="mini-cal">
        <div class="mini-cal-header">
          <span class="mini-cal-title" id="mini-title">Month Year</span>
          <div class="mini-cal-arrows">
            <button class="icon-btn icon-btn--xs" id="mini-prev" aria-label="Previous month">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </button>
            <button class="icon-btn icon-btn--xs" id="mini-next" aria-label="Next month">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </button>
          </div>
        </div>
        <div class="mini-cal-grid" id="mini-grid"><!-- populated by JS --></div>
      </div>

      <!-- My calendars -->
      <div class="my-calendars">
        <h2 class="sidebar-heading">My calendars</h2>
        <ul class="calendar-list" id="calendar-list"><!-- populated by JS --></ul>
      </div>
    </aside>

    <main class="calendar-main">
      <div class="calendar-grid" id="calendar-grid"><!-- populated by JS --></div>
    </main>
  </div>

  <!-- ── Modal ───────────────────────────────────────────────── -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-hidden="true">
    <div class="modal-dialog">
      <header class="modal-header">
        <h3 class="modal-title" id="modal-title">Add event</h3>
        <button class="icon-btn icon-btn--sm" id="modal-close" aria-label="Close">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </header>

      <form class="modal-form" id="event-form" novalidate>
        <input type="hidden" id="event-id">

        <div class="form-group">
          <label for="event-title">Title <span class="required" aria-hidden="true">*</span></label>
          <input type="text" id="event-title" name="title" maxlength="100" autocomplete="off" placeholder="Add title" aria-required="true" aria-describedby="error-title">
          <span class="error-msg" id="error-title" role="alert"></span>
        </div>

        <div class="form-group">
          <label for="event-date">Date</label>
          <input type="date" id="event-date" name="date">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="event-start">Start time</label>
            <input type="time" id="event-start" name="startTime">
          </div>
          <div class="form-group">
            <label for="event-end">End time</label>
            <input type="time" id="event-end" name="endTime" aria-describedby="error-time">
            <span class="error-msg" id="error-time" role="alert"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="event-calendar">Calendar</label>
          <select id="event-calendar" name="calendar"><!-- populated by JS --></select>
        </div>

        <div class="form-group">
          <label for="event-desc">Description</label>
          <textarea id="event-desc" name="description" maxlength="500" rows="3" placeholder="Add description"></textarea>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn--danger" id="btn-delete" hidden>Delete</button>
          <div class="modal-actions-right">
            <button type="button" class="btn btn--secondary" id="btn-cancel">Cancel</button>
            <button type="submit" class="btn btn--primary" id="btn-save">Save</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div class="sidebar-scrim" id="sidebar-scrim" hidden></div>

  <div id="calendar-announce" aria-live="polite" aria-atomic="true" class="sr-only"></div>

  <script src="app.js"></script>
</body>
</html>
