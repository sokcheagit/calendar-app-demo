<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="app-header">
    <div class="header-left">
      <button class="btn btn--menu" aria-label="Menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
      </button>
      <div class="app-brand">
        <svg class="brand-icon" viewBox="0 0 24 24" width="28" height="28"><rect width="24" height="24" rx="4" fill="#1a73e8"/><text x="12" y="17" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" font-family="sans-serif">31</text></svg>
        <span class="brand-name">Calendar</span>
      </div>
    </div>

    <div class="header-nav">
      <button class="btn btn--today" id="btn-today">Today</button>
      <div class="nav-arrows">
        <button class="btn btn--icon" id="btn-prev" aria-label="Previous month">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        </button>
        <button class="btn btn--icon" id="btn-next" aria-label="Next month">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </button>
      </div>
      <h2 class="month-label" id="month-label">Month Year</h2>
    </div>
  </header>

  <main>
    <div class="calendar-grid" id="calendar-grid">
      <!-- Populated by app.js -->
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-hidden="true">
    <div class="modal-dialog">
      <header class="modal-header">
        <h3 class="modal-title" id="modal-title">Add Event</h3>
        <button class="btn btn--icon modal-close" id="modal-close" aria-label="Close modal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </header>

      <form class="modal-form" id="event-form" novalidate>
        <input type="hidden" id="event-id">

        <div class="form-group">
          <label for="event-title">Title <span class="required" aria-hidden="true">*</span></label>
          <input type="text" id="event-title" name="title" maxlength="100" autocomplete="off" placeholder="Add title">
          <span class="error-msg" id="error-title" role="alert"></span>
        </div>

        <div class="form-group">
          <label for="event-date">Date</label>
          <input type="date" id="event-date" name="date">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="event-start">Start time</label>
            <input type="time" id="event-start" name="startTime">
          </div>
          <div class="form-group">
            <label for="event-end">End time</label>
            <input type="time" id="event-end" name="endTime">
            <span class="error-msg" id="error-time" role="alert"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="event-desc">Description</label>
          <textarea id="event-desc" name="description" maxlength="500" rows="3" placeholder="Add description"></textarea>
        </div>

        <div class="form-group">
          <label for="event-color">Color</label>
          <input type="color" id="event-color" name="color" value="#1a73e8">
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn--danger" id="btn-delete" hidden>Delete</button>
          <div class="modal-actions-right">
            <button type="button" class="btn btn--secondary" id="btn-cancel">Cancel</button>
            <button type="submit" class="btn btn--primary" id="btn-save">Save</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
